<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="styles.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" rel="stylesheet">
</head>

<body>

    <div class="container p-4 mt-4 bg-success-subtle">
        <div class="row bg-secondary">
            <h1>Payment form Example</h1>
        </div>

        <div class="row m-3 bg-danger bg-gradient">
            <p>Some fields are missing</p>
        </div>

        <div class="row bg-info-subtle">
            <div class="col-12">
                <form>
                    <div class="row">
                        <div class="col-md-4">
                            <label for="numeroTarjeta" class="form-label">Card</label>
                            <input type="number" class="form-control" id="numeroTarjeta" placeholder="XXXXXXXXXXXX" required>
                        </div>

                        <div class="col-md-4">
                            <label for="codigoTarjeta" class="form-label">CVC</label>
                            <input type="number" class="form-control" id="codigoTarjeta" placeholder="000" required>
                        </div>
                        <div class="col-md-4">
                            <label for="totalCargo" class="form-label">Amount</label>
                            <input type="number" class="form-control" id="totalCargo" placeholder="Total €" required>
                        </div>
                    </div>

                    <div class="row mb-3 mt-3">
                        <div class="col-md-6">
                            <label for="nombreCliente" class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="nombreCliente" placeholder="Pepe"required>
                        </div>
                        <div class="col-md-6">
                            <label for="apellidoCliente" class="form-label">Apellido</label>
                            <input type="text" class="form-control" id="apellidoCliente" placeholder="Pepito"required>
                        </div>
                    </div>
                    <div class="row mb-3 mt-3">
                        <div class="col-md-6">
                            <label for="ciudadCliente" class="form-label">City</label>
                            <input type="text" class="form-control" id="ciudadCliente" placeholder="Madrid"required>
                        </div>
                        <div class="col-md-3">
                            <label for="paisCliente" class="form-label">Country</label>
                            <select class="form-select" aria-label="Default select example" id="paisCliente"required>
                                <option selected>Spain</option>
                                <option value="1">Germany</option>
                                <option value="2">Colombia</option>
                                <option value="3">England</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label for="cpostalCliente" class="form-label">Postal code</label>
                            <input type="number" class="form-control" id="cpostalCliente" placeholder="00000"required>
                        </div>

                    </div>
                    <div class="row">
                        <label for="radioDefault">We accept:</label>
                        <div class="col-md-6 d-flex">
                            <div class="form-check me-3">
                                <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault1"required>
                                <label class="form-check-label" for="radioDefault1">
                                    <i class="fa-brands fa-cc-visa"></i>
                                </label>
                            </div>
                            <div class="form-check me-3">
                                <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault2"
                                    checked>
                                <label class="form-check-label" for="radioDefault2">
                                    <i class="fa-brands fa-cc-mastercard"></i>
                                </label>
                            </div>
                            <div class="form-check me-3">
                                <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault3"
                                    checked>
                                <label class="form-check-label" for="radioDefault3">
                                    <i class="fa-brands fa-cc-jcb"></i>
                                </label>
                            </div>
                            <div class="form-check me-3">
                                <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault4"
                                    checked>
                                <label class="form-check-label" for="radioDefault4">
                                    <i class="fa-solid fa-credit-card"></i>
                                </label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="mensaje">Message</label>
                            <div class="form-floating">
                                <textarea class="form-control" name="mensaje" placeholder="Leave a comment here" id="floatingTextarea2"
                                    style="height: 100px"></textarea>
                                <label for="floatingTextarea2">Comments</label>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end mt-3">
                        <button type="" class="btn btn-secondary me-3">Cancel</button>
                        <button type="submit" class="btn btn-primary">Send</button>
                    </div>
                </form>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
